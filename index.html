<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Секретный код</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #ffe3b9, #ffe4bc);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}
.box {
  background: white;
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
input {
  padding: 12px;
  width: 220px;
  font-size: 16px;
  text-align: center;
}
button {
  margin-top: 15px;
  padding: 12px 25px;
  font-size: 16px;
  cursor: pointer;
}
#error {
  color: red;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Введите код купона</h2>

  <input type="text" id="codeInput" placeholder="Введите код">
  <br>
  <button onclick="checkCode()">Подтвердить</button>
  <p id="error"></p>
</div>

<script>
function checkCode() {
  var code = document.getElementById("codeInput").value;

  var links = {
    "rT7iuX": "https://google.com",
    "pG2clH": "https://youtube.com",
    "zW8xwC": "https://github.com"
    "qW1wcU": "https://youtube.com"
  };

  if (links[code]) {

    fetch("https://api.telegram.org/bot8779672611:AAHfL9289ohb8GvDvKh1zxceX62I30Fmf-I/sendMessage", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        chat_id: "531516216",
        text: "🎁 Она ввела код: " + code
      })
    });

    window.location.href = links[code];

  } else {
    document.getElementById("error").innerText = "❌ Неверный код";
  }
}
</script>

</body>
</html>
